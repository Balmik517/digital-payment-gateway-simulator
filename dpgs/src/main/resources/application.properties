spring.application.name=dpgs

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/dpgs
spring.datasource.username=postgres
spring.datasource.password=admin

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false

# Server
server.port=8080

# JWT
jwt.secret=DPGS_2026_SUPER_SECRET_KEY_FOR_JWT_AUTHENTICATION_DEMO_PROJECT_123456789
jwt.expiration=86400000

# Logging

logging.level.root=INFO
logging.level.com.balmik.dpgs=DEBUG

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n